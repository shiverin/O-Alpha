services:
  timescale:
    image: timescale/timescaledb:latest-pg16
    container_name: oalpha-timescale
    environment:
      POSTGRES_USER: oalpha
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: oalpha
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oalpha -d oalpha"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: oalpha-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: api
    container_name: oalpha-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://oalpha:dev@timescale:5432/oalpha?sslmode=disable
      REDIS_URL: redis://redis:6379
      MIGRATIONS_PATH: file:///migrations
      HTTP_ADDR: ":8080"
    ports:
      - "8080:8080"
    volumes:
      - ./migrations:/migrations:ro
    depends_on:
      timescale:
        condition: service_healthy
      redis:
        condition: service_healthy

  ingest:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: ingest
    container_name: oalpha-ingest
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://oalpha:dev@timescale:5432/oalpha?sslmode=disable
      MIGRATIONS_PATH: file:///migrations
      INGEST_SYMBOLS: AAPL
      INGEST_INTERVAL: 1h
      INGEST_LOOKBACK: 17520h
    volumes:
      - ./migrations:/migrations:ro
    depends_on:
      timescale:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: oalpha-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  timescale_data:
